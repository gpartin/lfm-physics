name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run pre-commit quality gate on changed files
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            FROM_REF="origin/${{ github.base_ref }}"
          else
            FROM_REF="${{ github.event.before }}"
            if [ "$FROM_REF" = "0000000000000000000000000000000000000000" ]; then
              FROM_REF="$(git rev-list --max-parents=0 HEAD)"
            fi
          fi

          pre-commit run --from-ref "$FROM_REF" --to-ref "${{ github.sha }}"

  test:
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check lfm/ tests/

      - name: Run tests
        run: pytest --cov=lfm --cov-report=term-missing
